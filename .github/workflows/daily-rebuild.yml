name: Daily Rebuild

on:
  schedule:
    # Runs every day at 03:00 UTC (06:00 Turkey time)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages Deploy Hook
        run: |
          curl -fsS -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
