name: Weekly Video Update

on:
  schedule:
    - cron: '0 3 * * 1' # her pazartesi 03:00 UTC (TR 06:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Update video data
        id: update
        run: |
          output=$(npm run --silent update-videos)
          echo "result=$output" >> "$GITHUB_OUTPUT"
      # Not: contains() kullanma — "UNCHANGED" da 'CHANGED' substring'ini içerir.
      - name: Commit and push if changed
        if: steps.update.outputs.result == 'CHANGED'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/videos.json
          git commit -m "chore: weekly video data update"
          git push
      - name: Keepalive (prevent 60-day auto-disable)
        if: steps.update.outputs.result == 'UNCHANGED'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive"
          git push
